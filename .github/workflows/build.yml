name: "Build App"

on:
  pull_request:
    paths:
      - "androidApp/src/**"
      - "shared/src/**"
      - "*.gradle*"
      - "gradle/**"
    types:
      - "opened"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "main"
      - "master"
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    permissions:
      contents: write
      pull-requests: write
    name: "Build and Sign App"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: "Set up Gradle"
        uses: gradle/gradle-build-action@v3
        with:
          generate-job-summary: false

      - name: "Grant execute permission for gradlew"
        run: chmod +x gradlew

      # Decode keystore from GitHub Secrets
      - name: "Decode keystore"
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > release.keystore

      # Build APK and AAB with automatic signing via Gradle
      - name: "Build APK and AAB"
        run: ./gradlew androidApp:assembleRelease androidApp:bundleRelease --no-daemon
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # Upload signed APK artifact
      - name: "Upload signed APK"
        uses: actions/upload-artifact@v4
        with:
          name: "app-release-signed"
          path: "androidApp/build/outputs/apk/release/androidApp-release.apk"

      # Upload signed AAB artifact
      - name: "Upload signed AAB"
        uses: actions/upload-artifact@v4
        with:
          name: "app-release-bundle-signed"
          path: "androidApp/build/outputs/bundle/release/androidApp-release.aab"
