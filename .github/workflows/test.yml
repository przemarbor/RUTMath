name: "Check Android signing secrets"

on:
  workflow_dispatch: # Run manually from GitHub UI

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: "Check if secrets exist"
        run: |
          if [ -z "${{ secrets.SIGNING_KEYSTORE }}" ]; then
            echo "❌ Secret SIGNING_KEYSTORE is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_KEY_ALIAS }}" ]; then
            echo "❌ Secret SIGNING_KEY_ALIAS is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_KEYSTORE_PASSWORD }}" ]; then
            echo "❌ Secret SIGNING_KEYSTORE_PASSWORD is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}" ]; then
            echo "❌ Secret SIGNING_KEY_PASSWORD is missing"
            exit 1
          fi
          echo "✅ All secrets exist"

      - name: "Decode keystore"
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > release.keystore

      - name: "Verify keystore and alias"
        run: |
          set +e
          keytool -list -v \
            -keystore release.keystore \
            -storepass "${{ secrets.SIGNING_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.SIGNING_KEY_PASSWORD }}" \
            -alias "${{ secrets.SIGNING_KEY_ALIAS }}"
          if [ $? -ne 0 ]; then
            echo "❌ Failed to open keystore with provided secrets"
            exit 1
          fi
          echo "✅ Keystore and credentials are valid"
